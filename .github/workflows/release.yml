name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  tag:
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version and tag
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v0.1.0"
          else
            MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          git tag -a "$NEXT" -m "$NEXT"
          git push origin "$NEXT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

  build:
    needs: [tag]
    if: always() && (needs.tag.result == 'success' || startsWith(github.ref, 'refs/tags/'))
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: spacebase-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: spacebase-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: spacebase-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun build src/index.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [tag, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - run: chmod +x artifacts/*

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.version || github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
